# Global settings
[agent]
  interval = "10s"
  flush_interval = "10s"

# ── INPUT: read from Mosquitto via MQTT ──────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics  = [
    "chocolate/temperature",
    "chocolate/humidity"
  ]
  data_format = "value"
  data_type   = "float"

# ── OUTPUT: write to InfluxDB ─────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "mytoken123"
  organization = "iot-org"
  bucket       = "chocolate"